services:

  # ── Infrastruktur (startet immer) ─────────────────────────────────────────

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - haana-media:/media/haana/qdrant:rw
    environment:
      QDRANT__STORAGE__STORAGE_PATH: /media/haana/qdrant/storage
    ports:
      - "6333:6333"   # REST API + Dashboard
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/6333' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Agent-Instanzen werden dynamisch per AgentManager gestartet ───────────
  # Agents werden aus config.json gelesen und via 'docker run' gestartet —
  # nicht per docker-compose. Kein statischer Service-Eintrag nötig.
  # Image-Build: docker compose --profile build-only build

  # System-Instanzen (ha-assist, ha-advanced, haana-admin) werden per AgentManager
  # gestartet. Build-Profile stellen das Image bereit:

  instanz-ha-assist:
    profiles: [build-only]
    build: .

  instanz-ha-advanced:
    profiles: [build-only]
    build: .

  instanz-haana-admin:
    profiles: [build-only]
    build: .

  # ── Admin-Interface (immer aktiv – kein Profil) ────────────────────────────

  admin-interface:
    build: ./admin-interface
    env_file: .env
    environment:
      TZ:                     Europe/Berlin
      HAANA_MEDIA_DIR:        /media/haana
      HAANA_DATA_DIR:         /data
      HAANA_CONF_FILE:        /data/config/config.json
      HAANA_INST_DIR:         /app/instanzen
      # Docker-Management für User-Provisioning
      HAANA_HOST_BASE:        /opt/haana
      HAANA_DATA_VOLUME:      haana_haana-data
      HAANA_COMPOSE_NETWORK:  haana_default
      HAANA_AGENT_IMAGE:      ""
      WHATSAPP_BRIDGE_URL:    http://whatsapp-bridge:3001
      HAANA_ADMIN_PORT:       ${HAANA_ADMIN_PORT:-8080}
    ports:
      - "${HAANA_ADMIN_PORT:-8080}:${HAANA_ADMIN_PORT:-8080}"
    volumes:
      - ./instanzen:/app/instanzen
      - ./core:/app/core:ro
      - haana-data:/data
      - haana-media:/media/haana
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/haana/.claude:/claude-auth
      - /opt/haana:/opt/haana:rw
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy

  # ── WhatsApp-Bridge (Profil: agents) ──────────────────────────────────────

  whatsapp-bridge:
    profiles: [agents]
    build: ./whatsapp-bridge
    env_file: .env
    environment:
      ADMIN_URL:         http://admin-interface:8080
      BRIDGE_LOG_LEVEL:  ${BRIDGE_LOG_LEVEL:-info}
      BRIDGE_HTTP_PORT:  "3001"
      BRIDGE_CALLBACK_URL: "http://whatsapp-bridge:3001"
      # HAANA_BRIDGE_SECRET: "your-secret"  # Optional: schützt /api/whatsapp-config
    volumes:
      - haana-whatsapp-session:/app/session
    restart: unless-stopped
    depends_on:
      - admin-interface

  # ── Optionale Dienste (auskommentiert bis konfiguriert) ───────────────────

