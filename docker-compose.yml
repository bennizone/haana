services:

  # ── Infrastruktur (startet immer) ─────────────────────────────────────────

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - haana-qdrant:/qdrant/storage
    ports:
      - "6333:6333"   # REST API + Dashboard
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/6333' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Agent-Instanzen (Profile: agents) ─────────────────────────────────────
  # Starten mit: docker compose --profile agents up -d

  instanz-alice:
    profiles: [agents]
    build: .
    env_file: .env
    environment:
      HAANA_INSTANCE: alice
      HAANA_API_PORT: 8001
      HAANA_LOG_DIR: /data/logs
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "8001:8001"
    volumes:
      - ./instanzen/alice/CLAUDE.md:/app/CLAUDE.md:ro
      - ./skills:/app/skills:ro
      - haana-data:/data
      - /home/haana/.claude:/home/haana/.claude:ro
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy

  instanz-bob:
    profiles: [agents]
    build: .
    env_file: .env
    environment:
      HAANA_INSTANCE: bob
      HAANA_API_PORT: 8002
      HAANA_LOG_DIR: /data/logs
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "8002:8002"
    volumes:
      - ./instanzen/bob/CLAUDE.md:/app/CLAUDE.md:ro
      - ./skills:/app/skills:ro
      - haana-data:/data
      - /home/haana/.claude:/home/haana/.claude:ro
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy

  instanz-ha-assist:
    profiles: [agents]
    build: .
    env_file: .env
    environment:
      HAANA_INSTANCE: ha-assist
      HAANA_LOG_DIR: /data/logs
    volumes:
      - ./instanzen/ha-assist/CLAUDE.md:/app/CLAUDE.md:ro
      - ./skills:/app/skills:ro
      - haana-data:/data
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy

  instanz-ha-advanced:
    profiles: [agents]
    build: .
    env_file: .env
    environment:
      HAANA_INSTANCE: ha-advanced
      HAANA_LOG_DIR: /data/logs
    volumes:
      - ./instanzen/ha-advanced/CLAUDE.md:/app/CLAUDE.md:ro
      - ./skills:/app/skills:ro
      - haana-data:/data
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy

  # ── Admin-Interface (immer aktiv – kein Profil) ────────────────────────────

  admin-interface:
    build: ./admin-interface
    env_file: .env
    environment:
      HAANA_LOG_DIR:          /data/logs
      HAANA_DATA_DIR:         /data
      HAANA_CONF_FILE:        /data/config/config.json
      HAANA_INST_DIR:         /app/instanzen
      AGENT_URL_BENNI:        http://haana-instanz-alice-1:8001
      AGENT_URL_DOMI:         http://haana-instanz-bob-1:8002
      # Docker-Management für User-Provisioning
      HAANA_HOST_BASE:        /opt/haana
      HAANA_DATA_VOLUME:      haana_haana-data
      HAANA_COMPOSE_NETWORK:  haana_default
      HAANA_AGENT_IMAGE:      haana-instanz-alice  # wird beim ersten Start auto-detected
      WHATSAPP_BRIDGE_URL:    http://whatsapp-bridge:3001
    ports:
      - "8080:8080"
    volumes:
      - ./instanzen:/app/instanzen
      - haana-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.claude:/claude-auth
      - /home/haana/.local/share/claude/versions/2.1.70:/usr/local/bin/claude:ro
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy

  # ── WhatsApp-Bridge (Profil: agents) ──────────────────────────────────────

  whatsapp-bridge:
    profiles: [agents]
    build: ./whatsapp-bridge
    env_file: .env
    environment:
      ADMIN_URL:         http://admin-interface:8080
      BRIDGE_LOG_LEVEL:  ${BRIDGE_LOG_LEVEL:-info}
      BRIDGE_HTTP_PORT:  "3001"
    volumes:
      - haana-whatsapp-session:/app/session
    restart: unless-stopped
    depends_on:
      - admin-interface

  # ── Optionale Dienste (auskommentiert bis konfiguriert) ───────────────────

