  #   volumes:
  #     - haana-trilium:/home/node/trilium-data
  #   ports:
  #     - "8888:8888"
  #   restart: unless-stopped

  # ollama:
  #   image: ollama/ollama:latest
  #   volumes:
  #     - haana-ollama:/root/.ollama
  #   ports:
  #     - "11434:11434"
  #   restart: unless-stopped
