services:

  # ── Infrastruktur (startet immer) ─────────────────────────────────────────

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - haana-qdrant:/qdrant/storage
    ports:
      - "6333:6333"   # REST API + Dashboard
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/6333' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Agent-Instanzen (Profile: agents) ─────────────────────────────────────
  # Starten mit: docker compose --profile agents up -d

  instanz-alice:
    profiles: [agents]
    build: .
    env_file: .env
    environment:
      HAANA_INSTANCE: alice
      HAANA_API_PORT: 8001
      HAANA_LOG_DIR: /data/logs
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "8001:8001"
    volumes:
      - ./instanzen/alice/CLAUDE.md:/app/CLAUDE.md:ro
      - ./skills:/app/skills:ro
      - haana-data:/data
      - /root/.claude:/home/haana/.claude:ro
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy

  instanz-bob:
    profiles: [agents]
    build: .
    env_file: .env
    environment:
      HAANA_INSTANCE: bob
      HAANA_API_PORT: 8002
      HAANA_LOG_DIR: /data/logs
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "8002:8002"
    volumes:
      - ./instanzen/bob/CLAUDE.md:/app/CLAUDE.md:ro
      - ./skills:/app/skills:ro
      - haana-data:/data
      - /root/.claude:/home/haana/.claude:ro
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy

  instanz-ha-assist:
    profiles: [agents]
    build: .
    env_file: .env
    environment:
      HAANA_INSTANCE: ha-assist
      HAANA_LOG_DIR: /data/logs
    volumes:
      - ./instanzen/ha-assist/CLAUDE.md:/app/CLAUDE.md:ro
      - ./skills:/app/skills:ro
      - haana-data:/data
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy

  instanz-ha-advanced:
    profiles: [agents]
    build: .
    env_file: .env
    environment:
      HAANA_INSTANCE: ha-advanced
      HAANA_LOG_DIR: /data/logs
    volumes:
      - ./instanzen/ha-advanced/CLAUDE.md:/app/CLAUDE.md:ro
      - ./skills:/app/skills:ro
      - haana-data:/data
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy

  # ── Admin-Interface (immer aktiv – kein Profil) ────────────────────────────

  admin-interface:
    build: ./admin-interface
    env_file: .env
    environment:
      HAANA_LOG_DIR:        /data/logs
      HAANA_DATA_DIR:       /data
      HAANA_CONF_FILE:      /data/config/config.json
      HAANA_INST_DIR:       /app/instanzen
      AGENT_URL_BENNI:      http://instanz-alice:8001
      AGENT_URL_DOMI:       http://instanz-bob:8002
    ports:
      - "8080:8080"
    volumes:
      - ./instanzen:/app/instanzen:ro
      - haana-data:/data
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy

  # ── WhatsApp-Bridge (Profil: agents) ──────────────────────────────────────

  whatsapp-bridge:
    profiles: [agents]
    build: ./whatsapp-bridge
    env_file: .env
    environment:
      AGENT_URL_BENNI:   http://instanz-alice:8001
      BRIDGE_OWNER_JID:  ${BRIDGE_OWNER_JID:-}
      BRIDGE_LOG_LEVEL:  ${BRIDGE_LOG_LEVEL:-info}
    volumes:
      - haana-whatsapp-session:/app/session
    restart: unless-stopped
    depends_on:
      - instanz-alice

  # ── Optionale Dienste (auskommentiert bis konfiguriert) ───────────────────

