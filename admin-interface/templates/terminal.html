<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>HAANA Terminal</title>
  <link rel="stylesheet" href="/static/css/admin.css?v=1">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #1e1e1e; color: #eee; display: flex; flex-direction: column; height: 100vh; overflow: hidden; font-family: system-ui, sans-serif; }
    .toolbar { display: flex; align-items: center; gap: 12px; padding: 8px 16px; background: var(--bg-card, #252525); border-bottom: 1px solid var(--border, #444); flex-shrink: 0; }
    .toolbar label { font-size: 13px; color: var(--muted, #999); white-space: nowrap; }
    .toolbar select { flex: 1; max-width: 280px; }
    .btn { padding: 4px 12px; border: 1px solid #555; border-radius: 4px; cursor: pointer; font-size: 13px; background: #333; color: #eee; }
    .btn-primary { background: #1565c0; border-color: #1565c0; color: #fff; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #f44336; flex-shrink: 0; }
    .status-dot.connected { background: #4caf50; }
    .term-wrap { flex: 1; overflow: hidden; background: #1e1e1e; padding: 8px; }
    #terminal-xterm { height: 100%; }
  </style>
</head>
<body>
  <div class="toolbar">
    <label>Claude Code Provider</label>
    <select id="term-provider-select"></select>
    <button id="term-conn-btn" class="btn btn-primary" onclick="termConnect()">Verbinden</button>
    <div class="status-dot" id="term-status-dot"></div>
    <span id="term-status-text" style="font-size:12px;color:#999;"></span>
  </div>
  <div class="term-wrap">
    <div id="terminal-xterm"></div>
  </div>
  <script>
    fetch('/api/config').then(r => r.json()).then(cfg => {
      const sel = document.getElementById('term-provider-select');
      sel.innerHTML = '<option value="">-- Provider w\u00e4hlen --</option>';
      (cfg.providers || []).forEach(p => {
        const o = document.createElement('option');
        o.value = p.id; o.textContent = p.name || p.id;
        sel.appendChild(o);
      });
    }).catch(() => {});
  </script>
  <script src="/static/lib/xterm.min.js"></script>
  <script src="/static/lib/xterm-addon-fit.min.js"></script>
  <script src="/static/js/terminal.js?v=2"></script>
</body>
</html>
